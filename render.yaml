services:
  - type: web
    name: smartreceipt-api
    runtime: node
    rootDir: server
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 3001
      - key: UPLOAD_DIR
        value: ./uploads
